<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Hainaut Pedigree Viewer</title>
<link rel="stylesheet" href="viewer.css">
</head>
<body>

<div id="viewport">
  <div id="svg-container"></div>
</div>

<!-- Search -->
<div id="search-box">
  <input id="search-input" type="text" placeholder="Search…" autocomplete="off">
  <span id="search-info"></span>
  <button id="search-prev" title="Previous">&#9650;</button>
  <button id="search-next" title="Next">&#9660;</button>
  <button id="search-clear" title="Clear">&times;</button>
</div>

<!-- Zoom / pan controls -->
<div id="controls">
  <button id="btn-zin" title="Zoom in">+</button>
  <button id="btn-zout" title="Zoom out">&minus;</button>
  <button id="btn-z100" title="Zoom to 100%">1:1</button>
  <button id="btn-zfit" title="Zoom to fit">&#11036;</button>
  <div class="separator"></div>
  <button id="btn-up"   title="Move up">&#9650;</button>
  <button id="btn-down" title="Move down">&#9660;</button>
  <button id="btn-left" title="Move left">&#9664;</button>
  <button id="btn-right"title="Move right">&#9654;</button>
  <div class="separator"></div>
  <button id="btn-photos" title="Toggle photos" aria-pressed="true" aria-label="Toggle photos">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
      <path d="M12 5c-1.1 0-2 .9-2 2H7l-2 3H3v8c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2v-8h-2l-2-3h-3c0-1.1-.9-2-2-2zm0 5.5A3.5 3.5 0 1 1 12 16a3.5 3.5 0 0 1 0-7z"/>
    </svg>
  </button>
</div>

<script src="viewer.js"></script>
<script>
  // Read `?file=...` from URL and pass to initViewer; default is handled in viewer.js
  (function(){
    const params = new URLSearchParams(window.location.search);
    const file = params.get("file");
    initViewer(file);
  })();
</script>
</body>
</html>
